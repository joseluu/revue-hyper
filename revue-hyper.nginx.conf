server {
    listen 80;
    listen [::]:80;
    server_name revue-hyper.duckdns.org;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name revue-hyper.duckdns.org;

    # SSL certificates (Let's Encrypt via certbot, or adjust paths)
    ssl_certificate     /etc/letsencrypt/live/revue-hyper.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revue-hyper.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/revue-hyper.access.log;
    error_log  /var/log/nginx/revue-hyper.error.log;

    location / {
        proxy_pass         http://127.0.0.1:4401;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large PDF downloads
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        client_max_body_size  50M;
    }
}
